name: build-jar-plugin

on: [push, workflow_dispatch]
      
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version
        run: |
          java -version
          gradle -v

      - name: 缓存 Gradle 构建目录
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            community/build/  # 缓存构建产物
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
          
      - name: Build community
        working-directory: community
        run: |
          if [ ! -f build/distributions/rider-godot-community.zip ]; then
            ./gradlew buildPlugin
          else
            echo "skip community build"
          fi
      
      - name: Build gdscript
        working-directory: gdscript
        run: ./gradlew buildPlugin

      # Store an already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: community & gdscript
          path: |
           community/build/distributions/rider-godot-community.zip
           gdscript/build/distributions/*
